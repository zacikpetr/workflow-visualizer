# Build + test + binary-compatibility verification on every push / PR.
name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        run: ./gradlew build -PciBuild

      # Binary API compatibility across the supported IDE range — essential
      # with an open-ended untilBuild. Downloads the verification IDEs on the
      # first run; cached by setup-gradle afterwards.
      - name: Plugin Verifier
        run: ./gradlew verifyPlugin

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zip
          path: build/distributions/*.zip

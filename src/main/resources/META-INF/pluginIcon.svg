<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Curved edges drawn first so they sit under the nodes — plain lines, no
       arrowheads, to match the diagram aesthetic and stay clean at 16 px. -->
  <g stroke="#4a4a66" stroke-width="1.4" fill="none" stroke-linecap="round">
    <path d="M 20 10 Q 14 14 11 17"/>
    <path d="M 24 10 Q 28 14 30 17"/>
    <path d="M 11 26 Q 14 30 18 32"/>
    <path d="M 30 26 Q 27 30 23 32"/>
  </g>

  <!-- Start state (top, green) -->
  <rect x="14" y="2"  width="14" height="9" rx="4.5" fill="#a8d5ba" stroke="#5a9a6e" stroke-width="1.4"/>
  <!-- Event state (left, blue — matches the diagram's `event` type colour) -->
  <rect x="2"  y="17" width="14" height="9" rx="3"   fill="#b8daff" stroke="#6aa3e0" stroke-width="1.4"/>
  <!-- Located state (right, signature locate-yellow with darker border) -->
  <rect x="24" y="17" width="14" height="9" rx="3"   fill="#ffd54a" stroke="#c98a00" stroke-width="1.7"/>
  <!-- End state (bottom, pink, flatter) -->
  <rect x="14" y="31" width="14" height="7" rx="3.5" fill="#f5c6cb" stroke="#d98a8a" stroke-width="1.4"/>
</svg>
